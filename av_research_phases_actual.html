<!-- LOOP 1 -->
<div id="loop1" class="panel">
<svg width="100%" viewBox="0 0 680 500" role="img">
<title>Loop 1 as actually implemented: GradCAM attention shift and MC Dropout uncertainty feeding into sigmoid trust formula</title>

<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Input -->
<g class="c-gray"><rect x="200" y="20" width="280" height="52" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" font-size="13">nuScenes CAM_FRONT + LIDAR_TOP</text>
<text class="ts" x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="11">+ synthetic glare (0–0.9) or LiDAR dropout (0–80%)</text></g>

<line x1="340" y1="72" x2="340" y2="114" stroke="var(--color-border-secondary)" stroke-width="1.5" marker-end="url(#a)" fill="none"/>

<text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central" font-size="11">semantic segmentation features · 512×512 input</text></g>

<line x1="280" y1="166" x2="200" y2="210" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#a)" fill="none"/>
<line x1="400" y1="166" x2="480" y2="210" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#a)" fill="none"/>

<!-- GradCAM -->
<g class="c-amber"><rect x="60" y="210" width="220" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="232" text-anchor="middle" dominant-baseline="central" font-size="12">GradCAM saliency</text>
<text class="ts" x="170" y="250" text-anchor="middle" dominant-baseline="central" font-size="11">attention shift = 0.042</text>
<text class="ts" x="170" y="264" text-anchor="middle" dominant-baseline="central" font-size="11">clean vs glare comparison</text></g>

<!-- MC Dropout -->
<g class="c-amber"><rect x="400" y="210" width="220" height="64" rx="8" stroke-width="0.5"/>

<text class="ts" x="510" y="264" text-anchor="middle" dominant-baseline="central" font-size="11">unc glare = 0.000392 (+3.7%)</text></g>

<line x1="170" y1="274" x2="250" y2="320" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#a)" fill="none"/>
<line x1="510" y1="274" x2="430" y2="320" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#a)" fill="none"/>

<!-- Trust formula -->
<g class="c-teal"><rect x="160" y="320" width="360" height="64" rx="8" stroke-width="0.5"/>
