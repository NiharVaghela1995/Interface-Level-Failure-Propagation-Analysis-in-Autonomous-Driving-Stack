# .github/workflows/lint.yml
# ─────────────────────────────────────────────────────────────────────────────
# Python linting CI — runs on every push and pull request.
# Checks scripts/ for syntax errors and style issues.
# Does NOT run the full pipeline (too GPU-heavy for CI).
# ─────────────────────────────────────────────────────────────────────────────

name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on scripts/
        run: |
          ruff check scripts/ \
            --select E,F,W \
            --ignore E501 \
            --ignore W503

      - name: Check for syntax errors
        run: |
          python -m py_compile scripts/utils/sensor_degradation.py
          python -m py_compile scripts/utils/uncertainty.py
          python -m py_compile scripts/utils/trust.py
          python -m py_compile scripts/utils/planning.py
          python -m py_compile scripts/utils/metrics.py
          python -m py_compile scripts/phase4b_edl.py
          echo "All syntax checks passed."
